name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, and story tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Story tests (1.2–1.4)
        run: |
          npm run test:story-1.2
          npm run test:story-1.3
          npm run test:story-1.4

  android-release:
    name: Capacitor Android release build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build mobile web bundle
        run: npm run build:mobile

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Assemble Android release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Verify release APK artifact
        run: test -f android/app/build/outputs/apk/release/app-release.apk
