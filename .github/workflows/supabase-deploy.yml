# Incremental Supabase deploys only.
# Allowed: `supabase db push` (new migrations) + `supabase functions deploy`.
# Never: `db reset`, `db dump` overwrite, `migration repair` force, or schema wipe.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  — Account → Access Tokens
#   SUPABASE_PROJECT_ID    — Project Settings → General → Reference ID
#   SUPABASE_DB_PASSWORD   — Project Settings → Database → database password
name: Supabase deploy

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/supabase-deploy.yml'
  workflow_dispatch:

concurrency:
  group: supabase-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy (incremental)
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Require secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_ID" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Missing secrets: SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_ID, SUPABASE_DB_PASSWORD"
            exit 1
          fi

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Apply new migrations only
        run: supabase db push

      - name: Deploy edge functions
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_ID"
