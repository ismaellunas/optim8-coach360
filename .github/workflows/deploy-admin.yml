name: Deploy Admin

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-admin-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy admin to Vercel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel production environment
        working-directory: apps/admin
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel@latest pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Materialize Vite env for monorepo build
        working-directory: apps/admin
        run: |
          if [ ! -f .vercel/.env.production.local ]; then
            echo "::error::Missing .vercel/.env.production.local after vercel pull."
            exit 1
          fi
          cp .vercel/.env.production.local ../../.env.production.local

      - name: Build admin web app for Vercel
        working-directory: apps/admin
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -a
          if [ -f ../../.env.production.local ]; then
            # shellcheck disable=SC1091
            . ../../.env.production.local
          fi
          set +a

          # Optional override when vercel pull omits Build-scoped vars
          if [ -n "${{ secrets.VITE_SUPABASE_URL }}" ]; then
            export VITE_SUPABASE_URL="${{ secrets.VITE_SUPABASE_URL }}"
          fi
          if [ -n "${{ secrets.VITE_SUPABASE_ANON_KEY }}" ]; then
            export VITE_SUPABASE_ANON_KEY="${{ secrets.VITE_SUPABASE_ANON_KEY }}"
          fi

          if [ -z "${VITE_SUPABASE_URL:-}" ] || [ -z "${VITE_SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::Missing VITE_SUPABASE_URL or VITE_SUPABASE_ANON_KEY at build time."
            echo "In Vercel: set both for Production and enable them for Build (not Runtime only)."
            echo "Or add GitHub repo secrets VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY."
            exit 1
          fi

          npx vercel@latest build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel production
        working-directory: apps/admin
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel@latest deploy --prebuilt --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
