  <script>
    (function () {
      const data = JSON.parse(document.getElementById('tracker-data').textContent);
      const STATUSES = ['TODO', 'IN_PROGRESS', 'IN_REVIEW', 'DONE', 'BLOCKED'];
      let activeFilter = 'ALL';

      function formatDate(iso) {
        try {
          return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        } catch { return iso; }
      }

      function renderStats() {
        const stories = data.tickets.filter(t => t.type === 'STORY');
        const counts = {};
        STATUSES.forEach(s => counts[s] = 0);
        stories.forEach(s => counts[s.status] = (counts[s.status] || 0) + 1);
        const epics = data.tickets.filter(t => t.type === 'EPIC').length;
        document.getElementById('stats').innerHTML = [
          { label: 'Epics', value: epics },
          { label: 'Stories', value: stories.length },
          { label: 'Done', value: counts.DONE },
          { label: 'In Progress', value: counts.IN_PROGRESS },
          { label: 'Blocked', value: counts.BLOCKED },
          { label: 'Stakeholder Questions', value: data.open_questions.length }
        ].map(s => `<div class="stat"><strong>${s.value}</strong>${s.label}</div>`).join('');
      }

      function renderOpenQuestions() {
        const el = document.getElementById('open-questions');
        el.innerHTML = `
          <h2>⚠ Stakeholder questions (${data.open_questions.length}) — sent to client, pending response</h2>
          <ol>
            ${data.open_questions.map(q => `
              <li>
                <strong>${q.id}</strong>: ${q.question}
                <div class="ref">Source: ${q.source}${q.blocks ? ' · Blocks: ' + q.blocks.join(', ') : ''}</div>
              </li>
            `).join('')}
          </ol>
        `;
      }

      function renderFilters() {
        const el = document.getElementById('filters');
        const buttons = ['ALL', ...STATUSES];
        el.innerHTML = buttons.map(s =>
          `<button class="filter-btn${activeFilter === s ? ' active' : ''}" data-filter="${s}">${s === 'ALL' ? 'All' : s.replace('_', ' ')}</button>`
        ).join('');
        el.querySelectorAll('.filter-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            activeFilter = btn.dataset.filter;
            renderFilters();
            renderBoard();
          });
        });
      }

      function epicProgress(epicId) {
        const stories = data.tickets.filter(t => t.parent === epicId);
        const done = stories.filter(s => s.status === 'DONE').length;
        return `${done}/${stories.length} done`;
      }

      function renderStory(story) {
        if (activeFilter !== 'ALL' && story.status !== activeFilter) return '';
        return `
          <article class="story" data-id="${story.id}" data-status="${story.status}">
            <div class="story-header">
              <span class="story-id">${story.id}</span>
              <span class="badge badge-${story.status}">${story.status.replace('_', ' ')}</span>
            </div>
            <div class="story-title">${story.title}</div>
            <div class="story-desc">${story.description}</div>
            <div class="section-label">Requirements</div>
            <ul class="req-list">
              ${story.requirements.map(r => `<li><code>${r}</code></li>`).join('')}
            </ul>
            <div class="section-label">Acceptance Criteria</div>
            <ul class="ac-list">
              ${story.acceptance_criteria.map(ac => {
                if (typeof ac === 'string') return `<li>${ac}</li>`;
                const noTest = ac.test === null ? '<span class="ac-no-test">needs test</span>' : '';
                return `<li><code class="ac-id">${ac.id}</code> ${ac.statement} ${noTest}</li>`;
              }).join('')}
            </ul>
            <div class="audit-notes${story.audit_notes ? ' has-content' : ''}">
              Audit: ${story.audit_notes || '—'}
            </div>
            <div class="last-updated">Updated: ${formatDate(story.last_updated)}</div>
          </article>
        `;
      }

      function renderBoard() {
        const board = document.getElementById('board');
        const epics = data.tickets.filter(t => t.type === 'EPIC');
        board.innerHTML = epics.map(epic => {
          const stories = data.tickets.filter(t => t.parent === epic.id);
          const visibleStories = stories.map(renderStory).filter(Boolean).join('');
          const hidden = activeFilter !== 'ALL' && !visibleStories;
          if (hidden) return '';
          return `
            <section class="epic" data-epic="${epic.id}">
              <div class="epic-header" onclick="this.parentElement.classList.toggle('collapsed')">
                <span class="epic-toggle">▼</span>
                <div class="epic-meta">
                  <div class="epic-id">${epic.id} · <span class="badge badge-${epic.status}">${epic.status.replace('_', ' ')}</span></div>
                  <div class="epic-title">${epic.title}</div>
                  <div class="epic-desc">${epic.description}</div>
                  <div class="epic-progress">${epicProgress(epic.id)} · Requirements: ${epic.requirements.map(r => `<code>${r}</code>`).join(', ')}</div>
                </div>
              </div>
              <div class="stories">${visibleStories || '<p style="padding:1rem;color:var(--muted);font-size:0.875rem">No stories match filter.</p>'}</div>
            </section>
          `;
        }).join('');

        board.querySelectorAll('.epic.collapsed .stories').forEach(s => s.classList.add('hidden'));
        board.querySelectorAll('.epic-header').forEach(h => {
          h.addEventListener('click', () => {
            const epic = h.parentElement;
            const stories = epic.querySelector('.stories');
            const toggle = h.querySelector('.epic-toggle');
            const collapsed = epic.classList.toggle('collapsed');
            stories.classList.toggle('hidden', collapsed);
            toggle.textContent = collapsed ? '▶' : '▼';
          });
        });
      }

      renderStats();
      renderOpenQuestions();
      renderFilters();
      renderBoard();
    })();
  </script>
  <style>
    .epic.collapsed .stories { display: none; }
  </style>
