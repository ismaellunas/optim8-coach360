      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;

      color: var(--text);

      min-height: 100vh;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 1.5rem;

      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }
    .header-link {
      flex-shrink: 0;
      font-size: 0.8125rem;
      color: var(--accent);
      text-decoration: none;
      padding: 0.35rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-2);
    }
    .header-link:hover { border-color: var(--accent); }
    .header-links {
      display: flex;
      flex-shrink: 0;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    header p { color: var(--muted); font-size: 0.875rem; margin-top: 0.25rem; }
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1rem;
    }
    .stat {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.5rem 0.75rem;
      font-size: 0.8125rem;
    }
    .stat strong { display: block; font-size: 1.125rem; }
    .progress-wrap { margin-top: 1rem; }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8125rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    .progress-label strong { color: var(--text); }
    .progress-track {
      display: flex;
      height: 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-seg { height: 100%; }
    .progress-seg.done { background: var(--done); }
    .progress-seg.in-review { background: var(--in-review); }
    .progress-seg.in-progress { background: var(--in-progress); }
    .progress-seg.blocked { background: var(--blocked); }
    .progress-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 0.4rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .progress-legend .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 0.3rem;
      vertical-align: middle;
    }
    main { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
    .burndown {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem 0.75rem;
      margin-bottom: 1.5rem;
    }
    .burndown h2 { font-size: 0.9375rem; margin-bottom: 0.25rem; }
    .burndown .subtitle { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.5rem; }
    .burndown svg { width: 100%; height: auto; display: block; }
    .burndown .axis-label { fill: var(--muted); font-size: 10px; font-family: var(--font); }
    .burndown .grid-line { stroke: var(--border); stroke-width: 1; }
    .burndown .legend { display: flex; gap: 1rem; font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }
    .burndown .legend .swatch {
      display: inline-block;
      width: 16px;
      height: 3px;
      border-radius: 2px;
      margin-right: 0.35rem;
      vertical-align: middle;
    }
    .open-questions {
      background: var(--warning-bg);
      border: 1px solid var(--warning-border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    .open-questions h2 {
      font-size: 0.9375rem;
      color: #f0c14b;
      margin-bottom: 0.75rem;
    }
    .open-questions ol {
      padding-left: 1.25rem;
      font-size: 0.875rem;
    }
    .open-questions li { margin-bottom: 0.5rem; }
    .open-questions .ref {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
    }
    .epic {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 1.25rem;
      overflow: hidden;
    }
    .epic-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      user-select: none;

    .epic-header:hover { background: var(--surface-2); }

      font-size: 0.75rem;
      margin-top: 0.25rem;

      font-size: 0.75rem;
      color: var(--accent);

    .epic-desc {
      font-size: 0.8125rem;
      color: var(--muted);
      margin-top: 0.375rem;

      color: var(--muted);
      margin-top: 0.5rem;

      border-radius: var(--radius);
      margin: 0.5rem;
      padding: 1rem;

    .story-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .story-id {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--accent);
      font-weight: 600;
    }
    .badge {
      display: inline-block;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      padding: 0.125rem 0.5rem;
      border-radius: 999px;
      border: 1px solid transparent;
    }
    .badge-TODO { background: #21262d; color: var(--todo); border-color: #484f58; }
    .badge-IN_PROGRESS { background: #3d2e00; color: var(--in-progress); border-color: #9e6a03; }
    .badge-IN_REVIEW { background: #2d1f4e; color: var(--in-review); border-color: #6e40c9; }
    .badge-DONE { background: #0f2d1a; color: var(--done); border-color: #238636; }
    .badge-BLOCKED { background: #3d1418; color: var(--blocked); border-color: #da3633; }
    .badge-parallel { background: #032f3c; color: #39c5cf; border-color: #1b7c8c; cursor: help; }
    .story-title { font-size: 0.9375rem; font-weight: 600; width: 100%; margin-top: 0.25rem; }
    .story-desc {
      font-size: 0.8125rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }
    .section-label {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin: 0.75rem 0 0.375rem;

      border-radius: var(--radius);
      font-size: 0.75rem;
      color: var(--muted);

      color: var(--muted);

      margin-left: 0.25rem;

      color: var(--muted);
      margin-top: 0.5rem;

      margin-bottom: 1rem;

      color: #0d1117;

      padding: 2rem 1rem;
      color: var(--muted);
      font-size: 0.75rem;

  <script>
    (function () {
      const data = JSON.parse(document.getElementById('tracker-data').textContent);
      const STATUSES = ['TODO', 'IN_PROGRESS', 'IN_REVIEW', 'DONE', 'BLOCKED'];
      // Default to NOT_DONE so the initial view surfaces what still needs work.
      let activeFilter = 'NOT_DONE';

      function matchesFilter(status) {
        if (activeFilter === 'ALL') return true;
        if (activeFilter === 'NOT_DONE') return status !== 'DONE';
        return status === activeFilter;
      }

      function formatDate(iso) {
        try {
          return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        } catch { return iso; }
      }

      function renderStats() {
        const stories = data.tickets.filter(t => t.type === 'STORY');
        const counts = {};
        STATUSES.forEach(s => counts[s] = 0);
        stories.forEach(s => counts[s.status] = (counts[s.status] || 0) + 1);
        const epics = data.tickets.filter(t => t.type === 'EPIC').length;
        document.getElementById('stats').innerHTML = [
          { label: 'Epics', value: epics },
          { label: 'Stories', value: stories.length },
          { label: 'Done', value: counts.DONE },
          { label: 'In Progress', value: counts.IN_PROGRESS },
          { label: 'Blocked', value: counts.BLOCKED },
          { label: 'Stakeholder Questions', value: data.open_questions.length }
        ].map(s => `<div class="stat"><strong>${s.value}</strong>${s.label}</div>`).join('');
      }

      function renderProgress() {
        const stories = data.tickets.filter(t => t.type === 'STORY');
        const total = stories.length;
        const counts = {};
        STATUSES.forEach(s => counts[s] = stories.filter(t => t.status === s).length);
        const pct = total ? Math.round((counts.DONE / total) * 100) : 0;
        const seg = (n, cls) => n ? `<div class="progress-seg ${cls}" style="width:${(n / total) * 100}%"></div>` : '';
        document.getElementById('progress').innerHTML = `
          <div class="progress-label">
            <span><strong>${pct}%</strong> complete</span>
            <span>${counts.DONE} of ${total} stories done</span>
          </div>
          <div class="progress-track">
            ${seg(counts.DONE, 'done')}${seg(counts.IN_REVIEW, 'in-review')}${seg(counts.IN_PROGRESS, 'in-progress')}${seg(counts.BLOCKED, 'blocked')}
          </div>
          <div class="progress-legend">
            <span><span class="dot" style="background:var(--done)"></span>Done ${counts.DONE}</span>
            <span><span class="dot" style="background:var(--in-review)"></span>In Review ${counts.IN_REVIEW}</span>
            <span><span class="dot" style="background:var(--in-progress)"></span>In Progress ${counts.IN_PROGRESS}</span>
            <span><span class="dot" style="background:var(--blocked)"></span>Blocked ${counts.BLOCKED}</span>
            <span><span class="dot" style="background:var(--todo)"></span>Todo ${counts.TODO}</span>
          </div>
        `;
      }

      function renderBurndown() {
        const stories = data.tickets.filter(t => t.type === 'STORY');
        const total = stories.length;
        const DAY = 86400000;
        const toDay = d => Math.floor(new Date(d).getTime() / DAY) * DAY;

        const start = Math.min(...data.tickets.map(t => toDay(t.last_updated)));
        const end = Math.max(toDay(Date.now()), Math.max(...data.tickets.map(t => toDay(t.last_updated))));

        // Completions per day, approximated by each DONE story's last_updated date
        const doneByDay = {};
        stories.filter(s => s.status === 'DONE').forEach(s => {
          const d = toDay(s.last_updated);
          doneByDay[d] = (doneByDay[d] || 0) + 1;
        });

        const points = [];
        let remaining = total;
        for (let d = start; d <= end; d += DAY) {
          remaining -= doneByDay[d] || 0;
          points.push({ day: d, remaining });
        }

        const W = 900, H = 260, padL = 36, padR = 16, padT = 14, padB = 28;
        const plotW = W - padL - padR, plotH = H - padT - padB;
        const x = d => padL + ((d - start) / Math.max(end - start, DAY)) * plotW;
        const y = v => padT + (1 - v / total) * plotH;

        // Horizontal grid lines at ~5 intervals
        const yStep = Math.max(1, Math.ceil(total / 5));
        let grid = '';
        for (let v = 0; v <= total; v += yStep) {
          grid += `<line class="grid-line" x1="${padL}" y1="${y(v)}" x2="${W - padR}" y2="${y(v)}"/>`;
          grid += `<text class="axis-label" x="${padL - 6}" y="${y(v) + 3}" text-anchor="end">${v}</text>`;
        }

        // Date labels: first, last, and a few in between
        const fmt = d => new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        const nLabels = Math.min(6, points.length);
        let xLabels = '';
        for (let i = 0; i < nLabels; i++) {
          const d = start + Math.round((end - start) * (i / Math.max(nLabels - 1, 1)));
          xLabels += `<text class="axis-label" x="${x(d)}" y="${H - padB + 14}" text-anchor="middle">${fmt(d)}</text>`;
        }

        const actualPath = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${x(p.day).toFixed(1)},${y(p.remaining).toFixed(1)}`).join(' ');
        const idealPath = `M${x(start).toFixed(1)},${y(total).toFixed(1)} L${x(end).toFixed(1)},${y(0).toFixed(1)}`;
        const last = points[points.length - 1];

        document.getElementById('burndown').innerHTML = `
          <h2>Burndown</h2>
          <div class="subtitle">Remaining stories over time (completion dates approximated from last update of DONE stories) · ${last.remaining} of ${total} remaining</div>
          <svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Burndown chart of remaining stories over time">
            ${grid}
            ${xLabels}
            <path d="${idealPath}" fill="none" stroke="var(--muted)" stroke-width="1.5" stroke-dasharray="5 4"/>
            <path d="${actualPath}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
            <circle cx="${x(last.day)}" cy="${y(last.remaining)}" r="4" fill="var(--accent)"/>
          </svg>
          <div class="legend">
            <span><span class="swatch" style="background:var(--accent)"></span>Actual remaining</span>
            <span><span class="swatch" style="background:var(--muted)"></span>Ideal</span>
          </div>
        `;
      }

      function renderOpenQuestions() {
        const el = document.getElementById('open-questions');
        el.innerHTML = `
          <h2>⚠ Stakeholder questions (${data.open_questions.length}) — sent to client, pending response</h2>
          <ol>
            ${data.open_questions.map(q => `
              <li>
                <strong>${q.id}</strong>: ${q.question}
                <div class="ref">Source: ${q.source}${q.blocks ? ' · Blocks: ' + q.blocks.join(', ') : ''}</div>
              </li>
            `).join('')}
          </ol>
        `;
      }

      function renderFilters() {
        const el = document.getElementById('filters');
        const buttons = ['ALL', 'NOT_DONE', ...STATUSES];
        el.innerHTML = buttons.map(s =>
          `<button class="filter-btn${activeFilter === s ? ' active' : ''}" data-filter="${s}">${s === 'ALL' ? 'All' : s.replace(/_/g, ' ')}</button>`
        ).join('');
        el.querySelectorAll('.filter-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            activeFilter = btn.dataset.filter;
            renderFilters();
            renderBoard();
          });
        });
      }

      function epicProgress(epicId) {
        const stories = data.tickets.filter(t => t.parent === epicId);
        const done = stories.filter(s => s.status === 'DONE').length;
        return `${done}/${stories.length} done`;
      }

      function renderStory(story) {
        if (!matchesFilter(story.status)) return '';
        return `
          <article class="story" data-id="${story.id}" data-status="${story.status}">
            <div class="story-header">
              <span class="story-id">${story.id}</span>
              ${story.parallel_ready && story.status !== 'DONE' ? '<span class="badge badge-parallel" title="No prerequisites — can start now alongside other parallel-ready stories. See docs/delivery/parallel-work-plan.md">⇉ PARALLEL READY</span>' : ''}
              <span class="badge badge-${story.status}">${story.status.replace('_', ' ')}</span>
            </div>
            <div class="story-title">${story.title}</div>
            <div class="story-desc">${story.description}</div>
            <div class="section-label">Requirements</div>
            <ul class="req-list">
              ${story.requirements.map(r => `<li><code>${r}</code></li>`).join('')}
            </ul>
            <div class="section-label">Acceptance Criteria</div>
            <ul class="ac-list">
              ${story.acceptance_criteria.map(ac => {
                if (typeof ac === 'string') return `<li>${ac}</li>`;
                const noTest = ac.test === null ? '<span class="ac-no-test">needs test</span>' : '';
                return `<li><code class="ac-id">${ac.id}</code> ${ac.statement} ${noTest}</li>`;
              }).join('')}
            </ul>
            <div class="audit-notes${story.audit_notes ? ' has-content' : ''}">
              Audit: ${story.audit_notes || '—'}
            </div>
            <div class="last-updated">Updated: ${formatDate(story.last_updated)}</div>
          </article>
        `;
      }

      function renderBoard() {
        const board = document.getElementById('board');
        const epics = data.tickets.filter(t => t.type === 'EPIC');
        board.innerHTML = epics.map(epic => {
          const stories = data.tickets.filter(t => t.parent === epic.id);
          const visibleStories = stories.map(renderStory).filter(Boolean).join('');
          const hidden = activeFilter !== 'ALL' && !visibleStories;
          if (hidden) return '';
          return `
            <section class="epic" data-epic="${epic.id}">
              <div class="epic-header" onclick="this.parentElement.classList.toggle('collapsed')">
                <span class="epic-toggle">▼</span>
                <div class="epic-meta">
                  <div class="epic-id">${epic.id} · <span class="badge badge-${epic.status}">${epic.status.replace('_', ' ')}</span></div>
                  <div class="epic-title">${epic.title}</div>
                  <div class="epic-desc">${epic.description}</div>
                  <div class="epic-progress">${epicProgress(epic.id)} · Requirements: ${epic.requirements.map(r => `<code>${r}</code>`).join(', ')}</div>
                </div>
              </div>
              <div class="stories">${visibleStories || '<p style="padding:1rem;color:var(--muted);font-size:0.875rem">No stories match filter.</p>'}</div>
            </section>
          `;
        }).join('');

        board.querySelectorAll('.epic.collapsed .stories').forEach(s => s.classList.add('hidden'));
        board.querySelectorAll('.epic-header').forEach(h => {
          h.addEventListener('click', () => {
            const epic = h.parentElement;
            const stories = epic.querySelector('.stories');
            const toggle = h.querySelector('.epic-toggle');
            const collapsed = epic.classList.toggle('collapsed');
            stories.classList.toggle('hidden', collapsed);
            toggle.textContent = collapsed ? '▶' : '▼';
          });
        });
      }

      renderStats();
      renderProgress();
      renderBurndown();
      renderOpenQuestions();
      renderFilters();
      renderBoard();
    })();
  </script>
  <style>
    .epic.collapsed .stories { display: none; }
  </style>
</body>
</html>
